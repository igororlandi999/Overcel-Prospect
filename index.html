<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Canton Fair Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & TOKENS ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #2a2a2a;
      --accent:    #c8f135;
      --accent2:   #ff6b35;
      --text:      #f0f0f0;
      --text-mute: #6b6b6b;
      --text-dim:  #9a9a9a;
      --danger:    #ff4444;
      --success:   #4caf50;

      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;

      --radius:    6px;
      --header-h:  52px;
      --nav-h:     64px;
      --fab-size:  52px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    input, select, textarea, button {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
    }

    /* ── LAYOUT ─────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    #top-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      gap: 10px;
    }

    #header-title {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      flex: 1;
      text-align: center;
    }

    #main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(var(--nav-h) + 80px);
    }

    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-mute);
      transition: color .15s;
    }

    .nav-item.active { color: var(--accent); }
    .nav-item:active { opacity: .7; }

    .nav-icon {
      font-size: 18px;
      line-height: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── SYNC STATUS BAR ─────────────────────────────────────── */
    #sync-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-size: 11px;
      color: var(--text-mute);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #sync-bar.syncing { color: var(--accent); }
    #sync-bar.error   { color: var(--danger); }
    #sync-bar.ok      { color: var(--success); }

    #sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    #sync-bar.syncing #sync-dot {
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .3; }
    }

    #sync-bar button {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 2px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 11px;
    }

    #sync-bar button:active { background: var(--surface2); }

    /* ── ICON BUTTONS ────────────────────────────────────────── */
    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
      border-radius: var(--radius);
      flex-shrink: 0;
    }

    .btn-icon:active { background: var(--surface2); }
    .btn-icon.hidden { visibility: hidden; pointer-events: none; }
    .hidden { display: none !important; }

    /* ── SEARCH + FILTERS ────────────────────────────────────── */
    .search-bar-wrap {
      padding: 12px 14px 0;
    }

    #search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    #search-input:focus { border-color: var(--accent); }

    .filters-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filters-row::-webkit-scrollbar { display: none; }

    .filters-row select {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 10px;
      color: var(--text);
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .filters-row select:focus { border-color: var(--accent); }

    .score-filter-row {
      padding: 10px 14px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .score-filter-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }

    /* ── PRODUCT LIST ────────────────────────────────────────── */
    .product-list {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }

    .product-card:active { transform: scale(.99); }
    .product-card:hover  { border-color: #3a3a3a; }

    .product-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity .15s;
    }

    .product-card.priority::before { opacity: 1; }
    .product-card.high-urgency::before { background: var(--accent2); opacity: 1; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-name {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }

    .score-badge {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid var(--border);
    }

    .score-badge.high   { border-color: var(--accent); color: var(--accent); }
    .score-badge.medium { border-color: #888; color: #888; }
    .score-badge.low    { border-color: #444; color: #555; }

    .card-supplier {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text-mute);
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .tag.status-priority    { border-color: var(--accent); color: var(--accent); }
    .tag.status-negotiating { border-color: var(--accent2); color: var(--accent2); }
    .tag.status-request     { border-color: #888; color: #888; }
    .tag.urgency-high       { border-color: var(--danger); color: var(--danger); }

    .card-device {
      position: absolute;
      top: 8px;
      right: 50px;
      font-size: 9px;
      color: var(--text-mute);
      letter-spacing: .04em;
    }

    /* ── EMPTY STATE ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 30px;
      color: var(--text-dim);
    }

    .empty-state p { margin-bottom: 16px; }

    /* ── FAB ─────────────────────────────────────────────────── */
    #fab-add {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px);
      right: calc(50% - 224px);
      width: var(--fab-size);
      height: var(--fab-size);
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 26px;
      font-weight: 300;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(200,241,53,.3);
      z-index: 90;
      transition: transform .15s, box-shadow .15s;
    }

    #fab-add:active {
      transform: scale(.92);
      box-shadow: 0 2px 10px rgba(200,241,53,.2);
    }

    @media (max-width: 480px) {
      #fab-add { right: 16px; }
    }

    /* ── FORM ────────────────────────────────────────────────── */
    .product-form {
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .form-section {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .form-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--surface);
      cursor: pointer;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      user-select: none;
    }

    .toggle-arrow {
      font-size: 10px;
      transition: transform .2s;
    }

    .form-section-body.collapsed .toggle-arrow { transform: rotate(-90deg); }
    .form-section-body {
      padding: 14px;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid var(--border);
    }

    .form-section-body.collapsed { display: none; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }

    .form-group label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input[type=text], input[type=email], input[type=url],
    input[type=search], select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 11px;
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color .15s;
    }

    /* Fix: options herdam cor do sistema — forçar fundo escuro */
    select option {
      background: #1e1e1e;
      color: var(--text);
    }

    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; }

    .btn-link {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      padding: 0;
    }

    /* Mini-form inline de fornecedor */
    .inline-supplier-form {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px;
    }

    .inline-supplier-form input {
      font-size: 14px;
    }

    .inline-supplier-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: var(--font-head);
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .radio-group, .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .radio-label, .check-label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-dim);
    }

    input[type=radio], input[type=checkbox] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
    }

    .toggle-input { display: none; }

    .toggle-label {
      width: 38px;
      height: 22px;
      background: var(--border);
      border-radius: 11px;
      cursor: pointer;
      position: relative;
      transition: background .15s;
    }

    .toggle-label::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--text-mute);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform .15s, background .15s;
    }

    .toggle-input:checked + .toggle-label { background: var(--accent); }
    .toggle-input:checked + .toggle-label::after {
      transform: translateX(16px);
      background: #000;
    }

    /* Score sliders */
    .slider-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--text-dim);
    }

    .weight-tag {
      font-size: 10px;
      color: var(--text-mute);
      background: var(--border);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .slider-val {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }

    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      height: 4px;
    }

    /* Score preview circle */
    .score-preview-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 4px;
    }

    .score-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #score-value-form {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 500;
      color: var(--accent);
    }

    .score-label-hint {
      font-size: 11px;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* Photo preview */
    .photo-preview {
      margin-top: 8px;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .photo-preview img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      display: block;
    }

    /* Form actions */
    .form-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 6px 0 20px;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .btn-primary:active { opacity: .85; transform: scale(.98); }

    .btn-secondary {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: var(--radius);
      padding: 13px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .btn-secondary:active { background: var(--surface2); }
    .btn-large { width: 100%; }

    /* ── PRODUCT DETAIL ──────────────────────────────────────── */
    .view-detail { padding: 16px 14px; }

    .detail-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      margin-bottom: 16px;
    }

    .detail-name {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .detail-supplier-name {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 14px;
    }

    .detail-score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-score-big {
      font-family: var(--font-mono);
      font-size: 36px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }

    .detail-score-sub {
      font-size: 11px;
      color: var(--text-mute);
      text-transform: uppercase;
    }

    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .detail-section h4 {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-mute);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-field-label {
      font-size: 10px;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 2px;
    }

    .detail-field-val {
      font-size: 13px;
      color: var(--text);
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-danger {
      flex: 1;
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius);
      padding: 11px;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* ── SUMMARY ─────────────────────────────────────────────── */
    .view-summary { padding: 16px 14px; }

    .summary-header h2 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .summary-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .stat-card .stat-val {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }

    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-top: 4px;
    }

    .summary-section {
      margin-bottom: 20px;
    }

    .summary-section h3 {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-dim);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .mini-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }

    .mini-card .mini-name {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
    }

    .mini-card .mini-score {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--accent);
    }

    .status-bar-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 7px;
    }

    .status-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .status-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .status-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s ease;
    }

    .export-section { display: flex; flex-direction: column; gap: 10px; }

    /* ── SUPPLIERS ───────────────────────────────────────────── */
    .view-suppliers { padding: 16px 14px; }

    .supplier-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
    }

    .supplier-card-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }

    .supplier-card-main > div {
      flex: 1;
    }

    .btn-supplier-delete {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      background: none;
      border: 1px solid transparent;
      color: var(--text-mute);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, border-color .15s, background .15s;
    }

    .btn-supplier-delete:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(255,68,68,.08);
    }

    .btn-supplier-delete:active {
      background: rgba(255,68,68,.18);
    }

    .supplier-name {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .supplier-meta {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .supplier-meta span { white-space: nowrap; }

    /* ── TOAST ───────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 80px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      z-index: 200;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── SETUP SCREEN ────────────────────────────────────────── */
    #setup-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 24px;
      gap: 20px;
    }

    #setup-screen h2 {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
    }

    #setup-screen p {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.6;
    }

    #setup-screen input {
      width: 100%;
      font-size: 12px;
    }

    #setup-screen .setup-label {
      font-size: 11px;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 5px;
    }

    .setup-field { width: 100%; }

    #btn-setup-save {
      width: 100%;
      margin-top: 8px;
    }

    #btn-setup-skip {
      background: none;
      border: none;
      color: var(--text-mute);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ── SETTINGS PANEL ──────────────────────────────────────── */
    #settings-panel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 250;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    #settings-panel.open { display: flex; }

    .settings-sheet {
      background: var(--surface);
      border-radius: 12px 12px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      width: 100%;
      max-width: 480px;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .settings-sheet h3 {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .settings-sheet label {
      font-size: 11px;
      color: var(--text-mute);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 5px;
      display: block;
    }

    .settings-sheet .device-id-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-sheet .device-id-val {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 7px 10px;
    }
  </style>
</head>
<body>

  <!-- ── SETUP SCREEN (shown only once if no URL configured) ── -->
  <div id="setup-screen">
    <h2>Canton Fair Tracker</h2>
    <p>Informe seu nome para identificar de qual dispositivo vem cada produto.</p>

    <div class="setup-field">
      <div class="setup-label">Seu nome</div>
      <input type="text" id="setup-name-input" placeholder="Ex: Igor, Thiago..." />
    </div>

    <button class="btn-primary" id="btn-setup-save">Entrar</button>
    <button id="btn-setup-skip">Pular por enquanto</button>
  </div>

  <!-- ── SETTINGS PANEL ─────────────────────────────────────── -->
  <div id="settings-panel">
    <div class="settings-sheet">
      <h3>Configuracoes</h3>

      <div>
        <label>Device ID</label>
        <div class="device-id-row">
          <span class="device-id-val" id="settings-device-id"></span>
        </div>
      </div>

      <div>
        <label>Seu nome</label>
        <input type="text" id="settings-name-input" />
      </div>

      <button class="btn-primary" id="btn-settings-save">Salvar</button>
      <button class="btn-secondary" id="btn-settings-close">Fechar</button>
    </div>
  </div>

  <!-- ── APP ───────────────────────────────────────────────── -->
  <div id="app">
    <header id="top-header">
      <button id="btn-back" class="btn-icon hidden" aria-label="Voltar">&#8592;</button>
      <h1 id="header-title">Canton Fair</h1>
      <button id="btn-header-action" class="btn-icon" aria-label="Configuracoes" id="btn-settings-open">&#9881;</button>
    </header>

    <!-- Sync status -->
    <div id="sync-bar" class="ok">
      <span id="sync-dot"></span>
      <span id="sync-msg">Conectando ao Supabase...</span>
      <button id="btn-manual-sync">Sincronizar</button>
    </div>

    <main id="main-content"></main>

    <nav id="bottom-nav">
      <button class="nav-item active" data-view="home">
        <span class="nav-icon">&#9782;</span>
        <span class="nav-label">Produtos</span>
      </button>
      <button class="nav-item" data-view="summary">
        <span class="nav-icon">&#9998;</span>
        <span class="nav-label">Resumo</span>
      </button>
      <button class="nav-item" data-view="suppliers">
        <span class="nav-icon">&#128101;</span>
        <span class="nav-label">Fornecedores</span>
      </button>
    </nav>
  </div>

  <button id="fab-add" class="fab" aria-label="Adicionar">+</button>
  <div id="toast" class="toast hidden"></div>

  <!-- ── TEMPLATES ─────────────────────────────────────────── -->
  <template id="tpl-home">
    <div class="view-home">
      <div class="search-bar-wrap">
        <input type="search" id="search-input" placeholder="Buscar produto ou fornecedor..." autocomplete="off" />
      </div>
      <div class="filters-row">
        <select id="filter-category">
          <option value="">Todas categorias</option>
          <option value="Cells">Cells</option>
          <option value="Packs">Packs</option>
          <option value="BMS">BMS</option>
          <option value="Chargers">Chargers</option>
          <option value="Power Banks">Power Banks</option>
          <option value="Power Stations">Power Stations</option>
          <option value="Solar / Energy Storage">Solar / Energy Storage</option>
          <option value="Accessories">Accessories</option>
          <option value="Other">Other</option>
        </select>
        <select id="filter-status">
          <option value="">Todos status</option>
          <option value="Discovered">Discovered</option>
          <option value="Interesting">Interesting</option>
          <option value="Review Later">Review Later</option>
          <option value="Request Sample">Request Sample</option>
          <option value="Negotiating">Negotiating</option>
          <option value="Priority">Priority</option>
          <option value="Discarded">Discarded</option>
        </select>
        <select id="filter-sort">
          <option value="score">Maior score</option>
          <option value="recent">Mais recentes</option>
          <option value="urgency">Urgencia</option>
        </select>
      </div>
      <div class="score-filter-row">
        <label>Score minimo: <span id="score-filter-val">0</span></label>
        <input type="range" id="filter-score" min="0" max="10" step="0.5" value="0" />
      </div>
      <div id="product-list" class="product-list"></div>
      <div id="empty-state" class="empty-state hidden">
        <p>Nenhum produto encontrado.</p>
        <button class="btn-primary" id="btn-empty-add">+ Adicionar primeiro produto</button>
      </div>
    </div>
  </template>

  <template id="tpl-product-form">
    <form id="product-form" class="product-form" autocomplete="off">

      <div class="form-section">
        <div class="form-section-header" data-toggle="section-basic">
          <span>1. Informacoes Basicas</span><span class="toggle-arrow">&#9660;</span>
        </div>
        <div class="form-section-body" id="section-basic">
          <div class="form-group">
            <label>Nome do Produto *</label>
            <input type="text" name="productName" placeholder="Ex: LFP 18650 3000mAh" required />
          </div>
          <div class="form-group">
            <label>Fornecedor *</label>
            <select name="supplierId" id="supplier-select" required>
              <option value="">Selecionar fornecedor...</option>
            </select>
            <button type="button" class="btn-link" id="btn-new-supplier-inline">+ Novo fornecedor</button>
            <!-- Mini-form inline para adicionar fornecedor rapidamente -->
            <div id="inline-supplier-form" class="inline-supplier-form hidden">
              <input type="text" id="inline-supplier-name" placeholder="Nome do fornecedor" autocomplete="off" />
              <div class="inline-supplier-actions">
                <button type="button" class="btn-primary btn-sm" id="btn-inline-supplier-save">Adicionar</button>
                <button type="button" class="btn-secondary btn-sm" id="btn-inline-supplier-cancel">Cancelar</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select name="category">
              <option value="">Selecionar...</option>
              <option value="Cells">Cells</option>
              <option value="Packs">Packs</option>
              <option value="BMS">BMS</option>
              <option value="Chargers">Chargers</option>
              <option value="Power Banks">Power Banks</option>
              <option value="Power Stations">Power Stations</option>
              <option value="Solar / Energy Storage">Solar / Energy Storage</option>
              <option value="Accessories">Accessories</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Aplicacao</label>
            <input type="text" name="application" placeholder="Ex: E-bike, UPS, Solar..." />
          </div>
          <div class="form-group">
            <label>Diferencial Principal</label>
            <textarea name="keyDifferential" rows="2" placeholder="O que torna este produto especial?"></textarea>
          </div>
          <div class="form-group">
            <label>Tipo de Marca</label>
            <select name="brandType">
              <option value="">Selecionar...</option>
              <option value="Own Brand">Own Brand</option>
              <option value="White Label">White Label</option>
              <option value="OEM">OEM</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select name="status">
              <option value="Discovered">Discovered</option>
              <option value="Interesting">Interesting</option>
              <option value="Review Later">Review Later</option>
              <option value="Request Sample">Request Sample</option>
              <option value="Negotiating">Negotiating</option>
              <option value="Priority">Priority</option>
              <option value="Discarded">Discarded</option>
            </select>
          </div>
          <div class="form-group">
            <label>Urgencia</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="urgency" value="low" /> Baixa</label>
              <label class="radio-label"><input type="radio" name="urgency" value="medium" checked /> Media</label>
              <label class="radio-label"><input type="radio" name="urgency" value="high" /> Alta</label>
            </div>
          </div>
          <div class="form-group">
            <label>Proxima Acao</label>
            <input type="text" name="nextAction" placeholder="Ex: Solicitar datasheet, agendar visita..." />
          </div>
          <div class="form-group">
            <label>Foto do Produto</label>
            <input type="file" name="photo" id="photo-input" accept="image/*" capture="environment" />
            <div id="photo-preview" class="photo-preview hidden"></div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header" data-toggle="section-tech">
          <span>2. Informacoes Tecnicas</span><span class="toggle-arrow">&#9660;</span>
        </div>
        <div class="form-section-body collapsed" id="section-tech">
          <div class="form-group"><label>Quimica</label><input type="text" name="chemistry" placeholder="Ex: LFP, NMC, LiPo..." /></div>
          <div class="form-group"><label>Formato</label><input type="text" name="format" placeholder="Ex: 18650, prismatic, pouch..." /></div>
          <div class="form-row">
            <div class="form-group"><label>Tensao Nominal (V)</label><input type="text" name="nominalVoltage" placeholder="Ex: 3.2V" /></div>
            <div class="form-group"><label>Capacidade</label><input type="text" name="capacity" placeholder="Ex: 100Ah" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Corrente de Descarga</label><input type="text" name="dischargeCurrent" placeholder="Ex: 1C" /></div>
            <div class="form-group"><label>Corrente de Pico</label><input type="text" name="peakCurrent" placeholder="Ex: 2C" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Ciclos de Vida</label><input type="text" name="cycleLife" placeholder="Ex: 2000+" /></div>
            <div class="form-group"><label>Faixa de Temperatura</label><input type="text" name="temperatureRange" placeholder="Ex: -20C ~ 60C" /></div>
          </div>
          <div class="form-group"><label>Protecoes Incluidas</label><input type="text" name="protectionsIncluded" placeholder="Ex: OVP, UVP, OTP, SCP..." /></div>
          <div class="form-group">
            <label>Certificacoes</label>
            <div class="checkbox-group" id="certifications-group">
              <label class="check-label"><input type="checkbox" name="certifications" value="UN38.3" /> UN38.3</label>
              <label class="check-label"><input type="checkbox" name="certifications" value="MSDS" /> MSDS</label>
              <label class="check-label"><input type="checkbox" name="certifications" value="CE" /> CE</label>
              <label class="check-label"><input type="checkbox" name="certifications" value="RoHS" /> RoHS</label>
              <label class="check-label"><input type="checkbox" name="certifications" value="IEC" /> IEC</label>
              <label class="check-label"><input type="checkbox" name="certifications" value="Other" /> Other</label>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tem Datasheet?</label>
              <div class="toggle-wrap"><input type="checkbox" name="hasDatasheet" id="toggle-datasheet" class="toggle-input" /><label for="toggle-datasheet" class="toggle-label"></label></div>
            </div>
            <div class="form-group">
              <label>Tem Test Reports?</label>
              <div class="toggle-wrap"><input type="checkbox" name="hasTestReports" id="toggle-testreports" class="toggle-input" /><label for="toggle-testreports" class="toggle-label"></label></div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header" data-toggle="section-commercial">
          <span>3. Informacoes Comerciais</span><span class="toggle-arrow">&#9660;</span>
        </div>
        <div class="form-section-body collapsed" id="section-commercial">
          <div class="form-row">
            <div class="form-group"><label>MOQ</label><input type="text" name="moq" placeholder="Ex: 500 pcs" /></div>
            <div class="form-group"><label>Preco Unitario (USD)</label><input type="text" name="unitPrice" placeholder="Ex: $12.50" /></div>
          </div>
          <div class="form-group"><label>Faixa de Preco</label><input type="text" name="priceRange" placeholder="Ex: $10-$15 dependendo qtd." /></div>
          <div class="form-row">
            <div class="form-group"><label>Lead Time</label><input type="text" name="leadTime" placeholder="Ex: 30 dias" /></div>
            <div class="form-group"><label>Condicoes de Pagamento</label><input type="text" name="paymentTerms" placeholder="Ex: 30% T/T + 70%" /></div>
          </div>
          <div class="form-row toggles-row">
            <div class="form-group"><label>Faz OEM?</label><div class="toggle-wrap"><input type="checkbox" name="doesOEM" id="toggle-oem" class="toggle-input" /><label for="toggle-oem" class="toggle-label"></label></div></div>
            <div class="form-group"><label>Embalagem Custom?</label><div class="toggle-wrap"><input type="checkbox" name="customPackaging" id="toggle-packaging" class="toggle-input" /><label for="toggle-packaging" class="toggle-label"></label></div></div>
          </div>
          <div class="form-row toggles-row">
            <div class="form-group"><label>Exclusividade?</label><div class="toggle-wrap"><input type="checkbox" name="exclusivityPossible" id="toggle-exclusivity" class="toggle-input" /><label for="toggle-exclusivity" class="toggle-label"></label></div></div>
            <div class="form-group"><label>Amostra Disponivel?</label><div class="toggle-wrap"><input type="checkbox" name="sampleAvailable" id="toggle-sample" class="toggle-input" /><label for="toggle-sample" class="toggle-label"></label></div></div>
          </div>
          <div class="form-group"><label>Lead Time da Amostra</label><input type="text" name="sampleLeadTime" placeholder="Ex: 7 dias" /></div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header" data-toggle="section-logistics">
          <span>4. Logistica</span><span class="toggle-arrow">&#9660;</span>
        </div>
        <div class="form-section-body collapsed" id="section-logistics">
          <div class="form-row">
            <div class="form-group"><label>Peso</label><input type="text" name="weight" placeholder="Ex: 2.5 kg" /></div>
            <div class="form-group"><label>Dimensoes</label><input type="text" name="dimensions" placeholder="Ex: 200x100x50mm" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>HS Code</label><input type="text" name="hsCode" placeholder="Ex: 8507.60" /></div>
            <div class="form-group"><label>Carga Perigosa?</label><div class="toggle-wrap"><input type="checkbox" name="dangerousGoods" id="toggle-dangerous" class="toggle-input" /><label for="toggle-dangerous" class="toggle-label"></label></div></div>
          </div>
          <div class="form-group">
            <label>Tipo de Envio</label>
            <div class="checkbox-group">
              <label class="check-label"><input type="checkbox" name="shippingType" value="Air" /> Air</label>
              <label class="check-label"><input type="checkbox" name="shippingType" value="Sea" /> Sea</label>
              <label class="check-label"><input type="checkbox" name="shippingType" value="Courier" /> Courier</label>
            </div>
          </div>
          <div class="form-group">
            <label>Complexidade de Importacao</label>
            <select name="importComplexity">
              <option value="">Selecionar...</option>
              <option value="Easy">Easy</option>
              <option value="Medium">Medium</option>
              <option value="Hard">Hard</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header" data-toggle="section-scoring">
          <span>5. Avaliacao (Score)</span><span class="toggle-arrow">&#9660;</span>
        </div>
        <div class="form-section-body collapsed" id="section-scoring">
          <div class="score-preview-wrap">
            <div class="score-circle" id="score-circle-form">
              <span id="score-value-form">0.0</span>
            </div>
            <span class="score-label-hint">Score Final</span>
          </div>
          <div class="form-group slider-group">
            <label>Diferenciacao <span class="weight-tag">30%</span> <span class="slider-val" id="val-differentiation">5</span></label>
            <input type="range" name="differentiation" min="0" max="10" step="1" value="5" data-score />
          </div>
          <div class="form-group slider-group">
            <label>Potencial de Margem <span class="weight-tag">25%</span> <span class="slider-val" id="val-marginPotential">5</span></label>
            <input type="range" name="marginPotential" min="0" max="10" step="1" value="5" data-score />
          </div>
          <div class="form-group slider-group">
            <label>Fit com o Negocio <span class="weight-tag">20%</span> <span class="slider-val" id="val-businessFit">5</span></label>
            <input type="range" name="businessFit" min="0" max="10" step="1" value="5" data-score />
          </div>
          <div class="form-group slider-group">
            <label>Facilidade de Importar <span class="weight-tag">15%</span> <span class="slider-val" id="val-importEase">5</span></label>
            <input type="range" name="importEase" min="0" max="10" step="1" value="5" data-score />
          </div>
          <div class="form-group slider-group">
            <label>Confianca no Fornecedor <span class="weight-tag">10%</span> <span class="slider-val" id="val-supplierTrust">5</span></label>
            <input type="range" name="supplierTrust" min="0" max="10" step="1" value="5" data-score />
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-header" data-toggle="section-notes">
          <span>6. Notas</span><span class="toggle-arrow">&#9660;</span>
        </div>
        <div class="form-section-body collapsed" id="section-notes">
          <div class="form-group">
            <textarea name="notes" rows="4" placeholder="Observacoes gerais, impressoes, follow-ups..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary btn-large">Salvar Produto</button>
        <button type="button" class="btn-secondary btn-large" id="btn-cancel-form">Cancelar</button>
      </div>
    </form>
  </template>

  <template id="tpl-product-detail">
    <div class="view-detail" id="product-detail-view"></div>
  </template>

  <template id="tpl-summary">
    <div class="view-summary">
      <div class="summary-header"><h2>Resumo da Feira</h2></div>
      <div id="summary-stats" class="summary-stats"></div>
      <div class="summary-section"><h3>Top Produtos</h3><div id="summary-top-products"></div></div>
      <div class="summary-section"><h3>Por Status</h3><div id="summary-by-status"></div></div>
      <div class="summary-section"><h3>Por Categoria</h3><div id="summary-by-category"></div></div>
      <div class="summary-section"><h3>Lista de Prioridades</h3><div id="summary-priority-list"></div></div>
      <div class="summary-section export-section">
        <h3>Exportar Dados</h3>
        <button class="btn-primary btn-large" id="btn-export-json">Exportar JSON</button>
        <button class="btn-secondary btn-large" id="btn-export-csv">Exportar CSV</button>
      </div>
    </div>
  </template>

  // ═══════════════════════════════════════════════════════════

  function setSyncBar(state, msg) {
    const bar = document.getElementById('sync-bar');
    const txt = document.getElementById('sync-msg');
    if (!bar) return;
    bar.className = state;
    txt.textContent = msg;
  }

  // Upload photo to Supabase Storage, return public URL
  async function uploadPhotoToStorage(base64, productId) {
    try {
      const mime      = base64.match(/data:([^;]+);/)?.[1] || 'image/jpeg';
      const ext       = mime.split('/')[1] || 'jpg';
      const filename  = `canton-fair/${productId}.${ext}`;
      const b64data   = base64.split(',')[1];
      const binary    = atob(b64data);
      const bytes     = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: mime });

      // Upsert into storage bucket 'photos'
      const res = await fetch(`${SB_URL}/storage/v1/object/canton-fair-photos/${filename}`, {
        method: 'POST',
        headers: { ...SB_HDR, 'x-upsert': 'true', 'Content-Type': mime },
        body: blob
      });

      if (res.ok || res.status === 200) {
        return `${SB_URL}/storage/v1/object/public/canton-fair-photos/${filename}`;
      }
      return null;
    } catch (e) {
      return null;
    }
  }

  async function syncWithServer(force = false) {
    // Pull sempre roda (busca mudanças de outros dispositivos)
    // Push só roda quando há mudanças locais pendentes
    const shouldPush = force || pendingSync;
    setSyncBar('syncing', 'Sincronizando...');

    try {
      // ── 1. Fotos base64 residuais → Storage (só se há push pendente) ─
      if (shouldPush) {
        for (const p of products) {
          if (p.photo && typeof p.photo === 'string' && p.photo.startsWith('data:')) {
            const url = await uploadPhotoToStorage(p.photo, p.id);
            if (url) { p.photo = url; LS.set('cf_products', products); }
          }
        }
      }

      // ── 2. Busca servidor PRIMEIRO (sempre) ───────────────────
      const [pRes, sRes] = await Promise.all([
        fetch(`${SB_URL}/rest/v1/cf_products?select=*`, { headers: SB_HDR }),
        fetch(`${SB_URL}/rest/v1/cf_suppliers?select=*`, { headers: SB_HDR })
      ]);
      if (!pRes.ok) throw new Error('Fetch failed: ' + pRes.status);
      if (!sRes.ok) throw new Error('Fetch failed: ' + sRes.status);

      const serverProducts  = await pRes.json();
      const serverSuppliers = await sRes.json();

      // ── 3. Merge: o mais recente vence ────────────────────────
      function mergeRecords(localArr, serverRows) {
        const result = {};
        serverRows.forEach(row => {
          const d = row.data || {};
          result[row.id] = {
            ...d,
            id:         row.id,
            deviceId:   row.device_id   || d.deviceId,
            deviceName: row.device_name || d.deviceName,
            updatedAt:  Number(row.updated_at) || 0,
            deleted:    !!row.deleted
          };
        });
        localArr.forEach(local => {
          const srv = result[local.id];
          const localTs  = local.updatedAt  || 0;
          const serverTs = srv?.updatedAt   || 0;
          if (!srv || localTs > serverTs) {
            result[local.id] = local;
          } else {
            // Servidor mais novo — preserva foto local se servidor não tiver
            if (!result[local.id].photo && local.photo && typeof local.photo === 'string') {
              result[local.id] = { ...result[local.id], photo: local.photo };
            }
          }
        });
        return Object.values(result);
      }

      const finalProducts  = mergeRecords(products,  serverProducts);
      const finalSuppliers = mergeRecords(suppliers, serverSuppliers);

      // ── 4. Upsert só os registros locais mais novos que o servidor ─
      if (shouldPush) {
        const serverPMap = {};
        serverProducts.forEach(r => { serverPMap[r.id] = Number(r.updated_at) || 0; });
        const toUpsertProducts = products.filter(p => (p.updatedAt || 0) > (serverPMap[p.id] || 0));

        const serverSMap = {};
        serverSuppliers.forEach(r => { serverSMap[r.id] = Number(r.updated_at) || 0; });
        const toUpsertSuppliers = suppliers.filter(s => (s.updatedAt || 0) > (serverSMap[s.id] || 0));

        if (toUpsertProducts.length > 0) {
          const rows = toUpsertProducts.map(p => ({
            id:          p.id,
            device_id:   p.deviceId   || DEVICE_ID,
            device_name: p.deviceName || DEVICE_NAME,
            updated_at:  p.updatedAt  || Date.now(),
            deleted:     !!p.deleted,
            data:        p
          }));
          const r = await fetch(`${SB_URL}/rest/v1/cf_products?on_conflict=id`, {
            method: 'POST',
            headers: { ...SB_HDR, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
            body: JSON.stringify(rows)
          });
          if (!r.ok) throw new Error('Upsert products: ' + await r.text());
        }

      if (toUpsertSuppliers.length > 0) {
        const rows = toUpsertSuppliers.map(s => ({
          id:          s.id,
          device_id:   s.deviceId   || DEVICE_ID,
          device_name: s.deviceName || DEVICE_NAME,
          updated_at:  s.updatedAt  || Date.now(),
          deleted:     !!s.deleted,
          data:        s
        }));
        const r = await fetch(`${SB_URL}/rest/v1/cf_suppliers?on_conflict=id`, {
          method: 'POST',
          headers: { ...SB_HDR, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
          body: JSON.stringify(rows)
        });
        if (!r.ok) throw new Error('Upsert suppliers: ' + await r.text());
      }
      } // fim shouldPush

      // ── 5. Salva estado final ─────────────────────────────────
      products  = finalProducts;
      suppliers = finalSuppliers;
      LS.set('cf_products',  products);
      LS.set('cf_suppliers', suppliers);
      pendingSync = false;

      const ts = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      setSyncBar('ok', `Sincronizado as ${ts} — ${DEVICE_NAME || DEVICE_ID.slice(0,6)}`);

      if (currentView === 'home')      renderHome();
      if (currentView === 'suppliers') renderSuppliers();

    } catch (e) {
      setSyncBar('error', 'Falha: ' + e.message);
    }
  }

  function scheduleSync() {
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => syncWithServer(), 2000);
  }

  // Auto sync every 15s
  setInterval(() => syncWithServer(), 15000);

  // ═══════════════════════════════════════════════════════════
  //  SCORE
  // ═══════════════════════════════════════════════════════════
  function calcScore(p) {
    const w = { differentiation: .30, marginPotential: .25, businessFit: .20, importEase: .15, supplierTrust: .10 };
    return Object.keys(w).reduce((acc, k) => acc + (Number(p[k]) || 0) * w[k], 0);
  }
