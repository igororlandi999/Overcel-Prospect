  // ═══════════════════════════════════════════════════════════
  //  HOME
  // ═══════════════════════════════════════════════════════════
  function initHome() {
    renderHome();

    document.getElementById('search-input').addEventListener('input', renderHome);
    document.getElementById('filter-category').addEventListener('change', renderHome);
    document.getElementById('filter-status').addEventListener('change', renderHome);
    document.getElementById('filter-sort').addEventListener('change', renderHome);
    document.getElementById('filter-score').addEventListener('input', function () {
      document.getElementById('score-filter-val').textContent = this.value;
      renderHome();
    });

    const emptyAdd = document.getElementById('btn-empty-add');
    if (emptyAdd) emptyAdd.addEventListener('click', () => navigate('add-product'));
  }

  function renderHome() {
    const list = document.getElementById('product-list');
    const empty = document.getElementById('empty-state');
    if (!list) return;

    const q      = (document.getElementById('search-input')?.value || '').toLowerCase();
    const cat    = document.getElementById('filter-category')?.value || '';
    const status = document.getElementById('filter-status')?.value || '';
    const sort   = document.getElementById('filter-sort')?.value || 'score';
    const minScore = parseFloat(document.getElementById('filter-score')?.value || 0);

    let filtered = products.filter(p => {
      if (p.deleted) return false;
      const sup = suppliers.find(s => s.id === p.supplierId);
      const searchStr = [p.productName, p.category, p.application, sup?.supplierName].filter(Boolean).join(' ').toLowerCase();
      if (q && !searchStr.includes(q)) return false;
      if (cat && p.category !== cat) return false;
      if (status && p.status !== status) return false;
      if (calcScore(p) < minScore) return false;
      return true;
    });

    filtered.sort((a, b) => {
      if (sort === 'score')   return calcScore(b) - calcScore(a);
      if (sort === 'recent')  return (b.updatedAt || 0) - (a.updatedAt || 0);
      if (sort === 'urgency') {
        const u = { high: 3, medium: 2, low: 1 };
        return (u[b.urgency] || 0) - (u[a.urgency] || 0);
      }
      return 0;
    });

    list.innerHTML = '';

    if (!filtered.length) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    filtered.forEach(p => {
      const score = calcScore(p);
      const sup = suppliers.find(s => s.id === p.supplierId);
      const scoreCls = score >= 7 ? 'high' : score >= 4 ? 'medium' : 'low';

      const card = document.createElement('div');
      card.className = 'product-card' +
        (p.status === 'Priority' ? ' priority' : '') +
        (p.urgency === 'high' ? ' high-urgency' : '');

      const devName = p.deviceName || p.deviceId?.slice(0, 6) || '';
      const tagsHTML = [
        p.category ? `<span class="tag">${p.category}</span>` : '',
        p.status   ? `<span class="tag status-${p.status.toLowerCase().replace(/ /g,'-')}">${p.status}</span>` : '',
        p.urgency === 'high' ? `<span class="tag urgency-high">Urgente</span>` : '',
      ].filter(Boolean).join('');

      card.innerHTML = `
        <span class="card-device">${devName}</span>
        <div class="card-top">
          <span class="card-name">${p.productName || 'Sem nome'}</span>
          <span class="score-badge ${scoreCls}">${score.toFixed(1)}</span>
        </div>
        ${sup ? `<div class="card-supplier">${sup.supplierName}${sup.booth ? ' · ' + sup.booth : ''}</div>` : ''}
        <div class="card-tags">${tagsHTML}</div>
      `;
      card.addEventListener('click', () => navigate('product-detail', { product: p }));
      list.appendChild(card);
    });
  }

  // ═══════════════════════════════════════════════════════════
  //  PRODUCT FORM
  // ═══════════════════════════════════════════════════════════
  function initProductForm(product) {
    // Populate supplier dropdown — só os ativos
    const sel = document.getElementById('supplier-select');
    suppliers.filter(s => !s.deleted).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.supplierName;
      sel.appendChild(opt);
    });

    // Collapsible sections
    document.querySelectorAll('.form-section-header').forEach(h => {
      h.addEventListener('click', () => {
        const body = document.getElementById(h.dataset.toggle);
        const arrow = h.querySelector('.toggle-arrow');
        body.classList.toggle('collapsed');
        arrow.style.transform = body.classList.contains('collapsed') ? 'rotate(-90deg)' : '';
      });
    });

    // Score sliders
    const scoreFields = document.querySelectorAll('[data-score]');
    function updateScore() {
      const vals = { differentiation: 5, marginPotential: 5, businessFit: 5, importEase: 5, supplierTrust: 5 };
      scoreFields.forEach(s => {
        vals[s.name] = Number(s.value);
        const el = document.getElementById('val-' + s.name);
        if (el) el.textContent = s.value;
      });
      const score = calcScore(vals);
      document.getElementById('score-value-form').textContent = score.toFixed(1);
    }
    scoreFields.forEach(s => s.addEventListener('input', updateScore));
    updateScore();

    // Photo preview
    const photoInput = document.getElementById('photo-input');
    const photoPreview = document.getElementById('photo-preview');
    photoInput?.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        photoPreview.innerHTML = `<img src="${e.target.result}" />`;
        photoPreview.classList.remove('hidden');
        photoPreview.dataset.base64 = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Pre-fill if editing
    if (product) {
      const form = document.getElementById('product-form');
      Object.entries(product).forEach(([k, v]) => {
        const el = form.elements[k];
        if (!el) return;
        if (el.type === 'checkbox') { el.checked = !!v; return; }
        if (el.type === 'radio' || el.tagName === 'UNDEFINED') {
          const rb = form.querySelector(`[name="${k}"][value="${v}"]`);
          if (rb) rb.checked = true;
          return;
        }
        if (el.type === 'range') {
          el.value = v;
          const label = document.getElementById('val-' + k);
          if (label) label.textContent = v;
          return;
        }
        if (el.nodeName === 'SELECT') { el.value = v; return; }
        el.value = v;
      });

      // Checkboxes for arrays (certifications, shippingType)
      if (Array.isArray(product.certifications)) {
        product.certifications.forEach(c => {
          const cb = form.querySelector(`[name="certifications"][value="${c}"]`);
          if (cb) cb.checked = true;
        });
      }
      if (Array.isArray(product.shippingType)) {
        product.shippingType.forEach(c => {
          const cb = form.querySelector(`[name="shippingType"][value="${c}"]`);
          if (cb) cb.checked = true;
        });
      }
      if (product.photo) {
        photoPreview.innerHTML = `<img src="${product.photo}" />`;
        photoPreview.classList.remove('hidden');
        photoPreview.dataset.base64 = product.photo;
      }
      updateScore();
    }

    // Novo fornecedor inline — mostra mini-form sem sair da tela
    document.getElementById('btn-new-supplier-inline').addEventListener('click', () => {
      document.getElementById('inline-supplier-form').classList.remove('hidden');
      document.getElementById('btn-new-supplier-inline').classList.add('hidden');
      document.getElementById('inline-supplier-name').focus();
    });

    document.getElementById('btn-inline-supplier-cancel').addEventListener('click', () => {
      document.getElementById('inline-supplier-form').classList.add('hidden');
      document.getElementById('btn-new-supplier-inline').classList.remove('hidden');
      document.getElementById('inline-supplier-name').value = '';
    });

    document.getElementById('btn-inline-supplier-save').addEventListener('click', () => {
      const name = document.getElementById('inline-supplier-name').value.trim();
      if (!name) {
        document.getElementById('inline-supplier-name').focus();
        return;
      }

      // Cria fornecedor com só o nome — resto preenchido depois
      const newSupplier = {
        id:          genId(),
        supplierName: name,
        deviceId:    DEVICE_ID,
        deviceName:  DEVICE_NAME,
        updatedAt:   Date.now()
      };

      suppliers.push(newSupplier);
      saveLocal();
      scheduleSync();

      // Adiciona ao select e seleciona
      const sel = document.getElementById('supplier-select');
      const opt = document.createElement('option');
      opt.value = newSupplier.id;
      opt.textContent = newSupplier.supplierName;
      sel.appendChild(opt);
      sel.value = newSupplier.id;

      // Fecha o mini-form
      document.getElementById('inline-supplier-form').classList.add('hidden');
      document.getElementById('btn-new-supplier-inline').classList.remove('hidden');
      document.getElementById('inline-supplier-name').value = '';

      showToast(name + ' adicionado');
    });

    // Cancel
    document.getElementById('btn-cancel-form').addEventListener('click', () => navigate('home'));

    // Submit
    document.getElementById('product-form').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;

      // Disable submit button to prevent double-submit
      const submitBtn = form.querySelector('[type="submit"]');
      if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Salvando...'; }

      try {
        const data = {};

        // Collect all named fields
        const fd = new FormData(form);
        for (const [k, v] of fd.entries()) {
          if (['certifications','shippingType'].includes(k)) {
            data[k] = data[k] ? [...data[k], v] : [v];
          } else {
            data[k] = v;
          }
        }

        // Radio (urgency)
        const urgency = form.querySelector('[name="urgency"]:checked');
        if (urgency) data.urgency = urgency.value;

        // Meta — definir ID ANTES de qualquer coisa para o upload usar o ID correto
        data.id         = (product && product.id) || genId();
        data.deviceId   = DEVICE_ID;
        data.deviceName = DEVICE_NAME;
        data.updatedAt  = Date.now();

        // Photo — salva base64 localmente já, upload acontece no sync background
        const b64 = photoPreview.dataset.base64;
        if (b64 && typeof b64 === 'string') {
          data.photo = b64; // salva base64 local agora
        } else if (product && product.photo) {
          data.photo = product.photo; // mantém foto existente
        }

        if (product) {
          const idx = products.findIndex(p => p.id === product.id);
          if (idx >= 0) products[idx] = data;
        } else {
          products.push(data);
        }

        saveLocal();
        scheduleSync(); // sync faz upload da foto em background
        showToast('Produto salvo');
        navigate('home'); // navega IMEDIATAMENTE — não espera o upload

        // Envia email só para produtos NOVOS (não edições)
        if (!product) {
          sendProductEmail(data).catch(() => {}); // fire-and-forget, não bloqueia
        }
      } catch (err) {
        showToast('Erro ao salvar: ' + err.message);
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Salvar Produto'; }
      }
    });
  }

  // ═══════════════════════════════════════════════════════════
  //  PRODUCT DETAIL
  // ═══════════════════════════════════════════════════════════
  function renderProductDetail(p) {
    const v = document.getElementById('product-detail-view');
    if (!v) return;
    const score = calcScore(p);
    const sup = suppliers.find(s => s.id === p.supplierId);

    const field = (label, val) => val ? `
      <div>
        <div class="detail-field-label">${label}</div>
        <div class="detail-field-val">${val}</div>
      </div>` : '';

    v.innerHTML = `
      <div class="detail-hero">
        ${p.photo ? `<img src="${p.photo}" style="width:100%;border-radius:4px;margin-bottom:14px;max-height:200px;object-fit:cover;" />` : ''}
        <div class="detail-name">${p.productName || 'Sem nome'}</div>
        ${sup ? `<div class="detail-supplier-name">${sup.supplierName}${sup.booth ? ' · ' + sup.booth : ''}</div>` : ''}
        <div class="detail-score-row">
          <div class="detail-score-big">${score.toFixed(1)}</div>
          <div class="detail-score-sub">Score<br/>/ 10</div>
        </div>
        <div class="detail-tags">
          ${p.category ? `<span class="tag">${p.category}</span>` : ''}
          ${p.status   ? `<span class="tag">${p.status}</span>` : ''}
          ${p.urgency === 'high' ? `<span class="tag urgency-high">Urgente</span>` : ''}
          ${p.brandType ? `<span class="tag">${p.brandType}</span>` : ''}
        </div>
      </div>

      ${p.keyDifferential ? `<div class="detail-section"><h4>Diferencial</h4><p style="font-size:13px;color:var(--text-dim);line-height:1.6">${p.keyDifferential}</p></div>` : ''}
      ${p.nextAction ? `<div class="detail-section"><h4>Proxima Acao</h4><p style="font-size:14px;color:var(--accent)">${p.nextAction}</p></div>` : ''}

      <div class="detail-section">
        <h4>Informacoes Tecnicas</h4>
        <div class="detail-grid">
          ${field('Quimica', p.chemistry)}
          ${field('Formato', p.format)}
          ${field('Tensao', p.nominalVoltage)}
          ${field('Capacidade', p.capacity)}
          ${field('Ciclos', p.cycleLife)}
          ${field('Temperatura', p.temperatureRange)}
        </div>
        ${p.certifications?.length ? `<div style="margin-top:10px">${p.certifications.map(c=>`<span class="tag">${c}</span>`).join(' ')}</div>` : ''}
      </div>

      <div class="detail-section">
        <h4>Informacoes Comerciais</h4>
        <div class="detail-grid">
          ${field('MOQ', p.moq)}
          ${field('Preco Unit.', p.unitPrice)}
          ${field('Faixa', p.priceRange)}
          ${field('Lead Time', p.leadTime)}
          ${field('Pagamento', p.paymentTerms)}
          ${field('Amostra LT', p.sampleLeadTime)}
        </div>
        <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">
          ${p.doesOEM ? '<span class="tag">OEM</span>' : ''}
          ${p.customPackaging ? '<span class="tag">Custom Pkg</span>' : ''}
          ${p.exclusivityPossible ? '<span class="tag">Exclusividade</span>' : ''}
          ${p.sampleAvailable ? '<span class="tag">Amostra OK</span>' : ''}
        </div>
      </div>

      <div class="detail-section">
        <h4>Logistica</h4>
        <div class="detail-grid">
          ${field('Peso', p.weight)}
          ${field('Dimensoes', p.dimensions)}
          ${field('HS Code', p.hsCode)}
          ${field('Complexidade', p.importComplexity)}
        </div>
        ${p.shippingType?.length ? `<div style="margin-top:10px">${p.shippingType.map(c=>`<span class="tag">${c}</span>`).join(' ')}</div>` : ''}
        ${p.dangerousGoods ? '<span class="tag" style="margin-top:8px;display:inline-block;border-color:var(--danger);color:var(--danger)">Carga Perigosa</span>' : ''}
      </div>

      ${p.notes ? `<div class="detail-section"><h4>Notas</h4><p style="font-size:13px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap">${p.notes}</p></div>` : ''}

      <div class="detail-section">
        <h4>Score Detalhado</h4>
        <div class="detail-grid">
          ${field('Diferenciacao', (p.differentiation||5)+'/10')}
          ${field('Margem', (p.marginPotential||5)+'/10')}
          ${field('Fit Negocio', (p.businessFit||5)+'/10')}
          ${field('Importacao', (p.importEase||5)+'/10')}
          ${field('Fornecedor', (p.supplierTrust||5)+'/10')}
        </div>
      </div>

      <div style="font-size:11px;color:var(--text-mute);margin:10px 0">
        Adicionado por ${p.deviceName || p.deviceId?.slice(0,6) || 'desconhecido'} · ${p.updatedAt ? new Date(p.updatedAt).toLocaleString('pt-BR') : ''}
      </div>

      <div class="detail-actions">
        <button class="btn-primary" style="flex:2" id="btn-detail-edit">Editar</button>
        <button class="btn-danger" id="btn-detail-delete">Excluir</button>
      </div>
    `;

    document.getElementById('btn-detail-edit').addEventListener('click', () => navigate('edit-product', { product: p }));
    document.getElementById('btn-detail-delete').addEventListener('click', () => {
      if (confirm('Excluir este produto?')) {
        const idx = products.findIndex(x => x.id === p.id);
        if (idx >= 0) {
          // deleted flag lives BOTH in the envelope AND inside data
          // so it survives any sheet column misread
          products[idx] = {
            ...products[idx],
            deleted: true,
            updatedAt: Date.now(),
            deviceId: DEVICE_ID
          };
          products[idx].deleted = true; // redundant but explicit
        }
        saveLocal();
        scheduleSync();
        showToast('Produto excluido');
        navigate('home');
      }
    });
  }

  // ═══════════════════════════════════════════════════════════
  //  SUMMARY
  // ═══════════════════════════════════════════════════════════
  function renderSummary() {
    const statsEl = document.getElementById('summary-stats');
    if (!statsEl) return;

    const total     = products.length;
    const priority  = products.filter(p => p.status === 'Priority').length;
    const avgScore  = total ? (products.reduce((a, p) => a + calcScore(p), 0) / total).toFixed(1) : '0.0';
    const devices   = [...new Set(products.map(p => p.deviceId))].length;

    statsEl.innerHTML = `
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Produtos</div></div>
      <div class="stat-card"><div class="stat-val">${suppliers.length}</div><div class="stat-label">Fornecedores</div></div>
      <div class="stat-card"><div class="stat-val">${priority}</div><div class="stat-label">Prioridade</div></div>
      <div class="stat-card"><div class="stat-val">${avgScore}</div><div class="stat-label">Score Medio</div></div>
      <div class="stat-card"><div class="stat-val">${devices}</div><div class="stat-label">Dispositivos</div></div>
    `;

    // Top products
    const topEl = document.getElementById('summary-top-products');
    const top5 = [...products].sort((a,b) => calcScore(b) - calcScore(a)).slice(0,5);
    topEl.innerHTML = top5.map(p => {
      const score = calcScore(p);
      return `<div class="mini-card" data-id="${p.id}">
        <span class="mini-name">${p.productName}</span>
        <span class="mini-score">${score.toFixed(1)}</span>
      </div>`;
    }).join('');
    topEl.querySelectorAll('.mini-card').forEach(c => {
      c.addEventListener('click', () => {
        const p = products.find(x => x.id === c.dataset.id);
        if (p) navigate('product-detail', { product: p });
      });
    });

    // By status
    const statusEl = document.getElementById('summary-by-status');
    const statusMap = {};
    products.forEach(p => { statusMap[p.status || 'Unknown'] = (statusMap[p.status || 'Unknown'] || 0) + 1; });
    statusEl.innerHTML = Object.entries(statusMap).sort((a,b)=>b[1]-a[1]).map(([s, n]) => `
      <div class="status-bar-wrap">
        <div class="status-bar-label"><span>${s}</span><span>${n}</span></div>
        <div class="status-bar-track"><div class="status-bar-fill" style="width:${(n/total*100).toFixed(0)}%"></div></div>
      </div>`).join('');

    // By category
    const catEl = document.getElementById('summary-by-category');
    const catMap = {};
    products.forEach(p => { catMap[p.category || 'Outros'] = (catMap[p.category || 'Outros'] || 0) + 1; });
    catEl.innerHTML = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).map(([c,n]) => `
      <div class="status-bar-wrap">
        <div class="status-bar-label"><span>${c}</span><span>${n}</span></div>
        <div class="status-bar-track"><div class="status-bar-fill" style="width:${(n/total*100).toFixed(0)}%"></div></div>
      </div>`).join('');

    // Priority list
    const prioEl = document.getElementById('summary-priority-list');
    const prio = products.filter(p => p.status === 'Priority' || p.urgency === 'high');
    prioEl.innerHTML = prio.length ? prio.map(p => {
      const sup = suppliers.find(s => s.id === p.supplierId);
      return `<div class="mini-card" data-id="${p.id}">
        <span class="mini-name">${p.productName}${sup ? ' — ' + sup.supplierName : ''}</span>
        <span class="mini-score">${calcScore(p).toFixed(1)}</span>
      </div>`;
    }).join('') : '<p style="color:var(--text-mute);font-size:13px">Nenhum produto prioritario ainda.</p>';
    prioEl.querySelectorAll('.mini-card').forEach(c => {
      c.addEventListener('click', () => {
        const p = products.find(x => x.id === c.dataset.id);
        if (p) navigate('product-detail', { product: p });
      });
    });

    // Export
    document.getElementById('btn-export-json').addEventListener('click', exportJSON);
    document.getElementById('btn-export-csv').addEventListener('click', exportCSV);
  }

  function exportJSON() {
    const blob = new Blob([JSON.stringify({ products, suppliers }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `canton-fair-${Date.now()}.json`;
    a.click();
  }

  function exportCSV() {
    const headers = ['Nome','Fornecedor','Categoria','Status','Urgencia','Score','MOQ','Preco','Lead Time','Quimica','Notas'];
    const rows = products.map(p => {
      const sup = suppliers.find(s => s.id === p.supplierId);
      return [
        p.productName, sup?.supplierName, p.category, p.status, p.urgency,
        calcScore(p).toFixed(1), p.moq, p.unitPrice, p.leadTime, p.chemistry, p.notes
      ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`);
    });
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `canton-fair-${Date.now()}.csv`;
    a.click();
  }

  // ═══════════════════════════════════════════════════════════
  //  SUPPLIERS
  // ═══════════════════════════════════════════════════════════
  function renderSuppliers() {
    const list  = document.getElementById('suppliers-list');
    const empty = document.getElementById('suppliers-empty');
    if (!list) return;

    const active = suppliers.filter(s => !s.deleted);

    if (!active.length) {
      empty.classList.remove('hidden');
      list.innerHTML = '';
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = active.map(s => {
      const prodCount = products.filter(p => p.supplierId === s.id && !p.deleted).length;
      return `<div class="supplier-card" data-id="${s.id}">
        <div class="supplier-card-main">
          <div>
            <div class="supplier-name">${s.supplierName}</div>
            <div class="supplier-meta">
              ${s.contactName ? `<span>${s.contactName}</span>` : ''}
              ${s.booth ? `<span>${s.booth}</span>` : ''}
              ${s.city ? `<span>${s.city}</span>` : ''}
              <span>${prodCount} produto${prodCount !== 1 ? 's' : ''}</span>
            </div>
          </div>
          <button class="btn-supplier-delete" data-id="${s.id}" aria-label="Excluir fornecedor">&#10005;</button>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.supplier-card-main > div').forEach(div => {
      div.addEventListener('click', () => {
        const card = div.closest('.supplier-card');
        const s = suppliers.find(x => x.id === card.dataset.id);
        if (s) navigate('edit-supplier', { supplier: s });
      });
    });

    list.querySelectorAll('.btn-supplier-delete').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const s = suppliers.find(x => x.id === btn.dataset.id);
        if (!s) return;
        const prodCount = products.filter(p => p.supplierId === s.id && !p.deleted).length;
        const msg = prodCount > 0
          ? `Excluir "${s.supplierName}"? Ele tem ${prodCount} produto(s) associado(s).`
          : `Excluir "${s.supplierName}"?`;
        if (!confirm(msg)) return;

        const idx = suppliers.findIndex(x => x.id === s.id);
        if (idx >= 0) {
          suppliers[idx] = { ...suppliers[idx], deleted: true, updatedAt: Date.now(), deviceId: DEVICE_ID, deviceName: DEVICE_NAME };
        }
        saveLocal();
        scheduleSync();
        showToast('Fornecedor excluido');
        renderSuppliers();
      });
    });
  }

  function initSupplierForm(supplier) {
    if (supplier) {
      const form = document.getElementById('supplier-form');
      Object.entries(supplier).forEach(([k, v]) => {
        const el = form.elements[k];
        if (el) el.value = v;
      });
    }

    document.getElementById('btn-cancel-supplier').addEventListener('click', () => navigate('suppliers'));

    document.getElementById('supplier-form').addEventListener('submit', e => {
      e.preventDefault();
      const form = e.target;
      const data = {};
      new FormData(form).forEach((v, k) => { data[k] = v; });
      data.id        = (supplier && supplier.id) || genId();
      data.deviceId  = DEVICE_ID;
      data.deviceName = DEVICE_NAME;
      data.updatedAt = Date.now();

      if (supplier) {
        const idx = suppliers.findIndex(s => s.id === supplier.id);
        if (idx >= 0) suppliers[idx] = data;
      } else {
        suppliers.push(data);
      }

      saveLocal();
      scheduleSync();
      showToast('Fornecedor salvo');
      navigate('suppliers');
    });
  }

  // ═══════════════════════════════════════════════════════════
  //  TOAST
  // ═══════════════════════════════════════════════════════════
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      t.classList.remove('show');
      setTimeout(() => t.classList.add('hidden'), 200);
    }, 2200);
  }

  // ═══════════════════════════════════════════════════════════
  //  SETUP SCREEN
  // ═══════════════════════════════════════════════════════════
  function initSetupScreen() {
    const screen = document.getElementById('setup-screen');
    if (!screen) return;

    if (DEVICE_NAME) {
      screen.style.display = 'none';
      return;
    }

    document.getElementById('btn-setup-save').addEventListener('click', () => {
      const name = document.getElementById('setup-name-input').value.trim();
      if (!name) { alert('Insira seu nome.'); return; }
      DEVICE_NAME = name;
      LS.set('cf_device_name', name);
      screen.style.display = 'none';
      syncWithServer(true);
    });

    document.getElementById('btn-setup-skip').addEventListener('click', () => {
      screen.style.display = 'none';
      syncWithServer(true);
    });
  }

  // ═══════════════════════════════════════════════════════════
  //  SETTINGS PANEL
  // ═══════════════════════════════════════════════════════════
  function openSettings() {
    const panel = document.getElementById('settings-panel');
    panel.classList.add('open');
    document.getElementById('settings-device-id').textContent = DEVICE_ID;
    document.getElementById('settings-name-input').value = DEVICE_NAME;
  }

  function initSettings() {
    document.getElementById('btn-settings-save').addEventListener('click', () => {
      DEVICE_NAME = document.getElementById('settings-name-input').value.trim();
      LS.set('cf_device_name', DEVICE_NAME);
      document.getElementById('settings-panel').classList.remove('open');
      showToast('Configuracoes salvas');
    });

    document.getElementById('btn-settings-close').addEventListener('click', () => {
      document.getElementById('settings-panel').classList.remove('open');
    });

    document.getElementById('settings-panel').addEventListener('click', e => {
      if (e.target === document.getElementById('settings-panel')) {
        document.getElementById('settings-panel').classList.remove('open');
      }
    });
  }

  // ═══════════════════════════════════════════════════════════
  //  BOOT
  // ═══════════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', () => {
    initSetupScreen();
    initSettings();

    // Nav
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => navigate(btn.dataset.view));
    });

    // FAB
    document.getElementById('fab-add').addEventListener('click', () => {
      if (currentView === 'suppliers') navigate('add-supplier');
      else navigate('add-product');
    });

    // Back button header
    document.getElementById('btn-back').addEventListener('click', () => {
      if (['add-product','edit-product','product-detail'].includes(currentView)) navigate('home');
      else if (['add-supplier','edit-supplier'].includes(currentView)) navigate('suppliers');
      else navigate('home');
    });

    // Header action (settings by default)
    document.getElementById('btn-header-action').addEventListener('click', openSettings);

    // Manual sync
    document.getElementById('btn-manual-sync').addEventListener('click', () => syncWithServer(true));

    // Initial render
    navigate('home');

    // Initial sync
    setSyncBar('syncing', 'Conectando...');
    syncWithServer(true);
  });
  </script>
</body>
</html>
