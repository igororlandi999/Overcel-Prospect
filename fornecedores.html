<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Canton Fair 139 — Mapa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0EFEB;color:#1a1a1a;font-size:14px;overflow-x:hidden}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-t{font-size:15px;font-weight:600;letter-spacing:-.02em}
.hdr-s{font-size:11px;color:#888;margin-top:1px;font-variant-numeric:tabular-nums}

/* PHASE SWITCHER */
.phase-bar{display:flex;gap:0;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.phase-btn{padding:11px 18px;font-size:13px;font-weight:500;color:#888;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0}
.phase-btn.on{color:#1a1a1a;border-bottom-color:#1a1a1a}

/* MAIN LAYOUT */
.main{display:flex;gap:0;height:calc(100vh - 88px);overflow:hidden}

/* SIDEBAR */
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:1px solid rgba(0,0,0,.08);overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-section{padding:10px 12px 4px;font-size:10px;font-weight:600;letter-spacing:.06em;color:#aaa;text-transform:uppercase;border-top:1px solid rgba(0,0,0,.05)}
.sidebar-section:first-child{border-top:none}
.cat-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:all .12s}
.cat-item:hover{background:#F7F6F2}
.cat-item.on{background:#F0EFEB;border-left-color:currentColor}
.cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-name{font-size:12px;line-height:1.3}
.cat-halls{font-size:10px;color:#aaa;margin-top:1px}

/* MAP AREA */
.map-area{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;background:#F0EFEB;padding:16px;display:flex;flex-direction:column;gap:12px}

/* COMPLEX WRAPPER */
.complex{position:relative;width:100%;max-width:700px;margin:0 auto}

/* ROAD LABEL */
.road{text-align:center;font-size:10px;color:#aaa;letter-spacing:.05em;padding:4px 0;font-weight:500}

/* AREA ROW */
.area-row{display:grid;gap:8px}
.area-row.top{grid-template-columns:1fr 1fr}
.area-row.bottom{grid-template-columns:1fr 1fr 1fr 1fr}

/* AREA BOX */
.area-box{background:#fff;border-radius:12px;border:1.5px solid rgba(0,0,0,.08);padding:10px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.area-box:active{transform:scale(.98)}
.area-box.highlighted{border-color:currentColor;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.area-box.dimmed{opacity:.35}

.area-label{font-size:10px;font-weight:700;letter-spacing:.08em;color:#aaa;text-transform:uppercase;margin-bottom:6px}
.area-name{font-size:12px;font-weight:600;margin-bottom:6px;line-height:1.2}

/* HALL GRID */
.hall-grid{display:flex;flex-wrap:wrap;gap:4px}
.hall{padding:3px 6px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.hall:active{transform:scale(.95)}
.hall.focus{outline:2px solid #1a1a1a;outline-offset:1px}

/* OPEN AREA BADGE */
.open-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:#F0EFEB;color:#888;margin-top:4px;display:inline-block}

/* DETAIL PANEL */
.detail{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.08);padding:14px 16px;max-width:700px;margin:0 auto;width:100%}
.detail-none{color:#bbb;font-size:13px;text-align:center;padding:20px}
.detail-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.detail-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0;margin-top:2px}
.detail-title{font-size:14px;font-weight:600}
.detail-halls{font-size:12px;color:#888;margin-top:2px}
.detail-desc{font-size:12px;color:#555;line-height:1.6;margin-top:6px;padding-top:8px;border-top:1px solid rgba(0,0,0,.06)}
.detail-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:6px;margin-right:4px}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid rgba(0,0,0,.06);max-width:700px;width:100%;margin:0 auto}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.legend-swatch{width:10px;height:10px;border-radius:3px}

/* PROMENADE */
.promenade{text-align:center;font-size:10px;color:#93C5FD;background:#EFF6FF;border-radius:6px;padding:4px 8px;letter-spacing:.04em}

/* MOBILE SIDEBAR TOGGLE */
.mob-cats{display:none;background:#fff;border-bottom:1px solid rgba(0,0,0,.08);padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;flex-wrap:nowrap}
.mob-cat{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid rgba(0,0,0,.1);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .12s}
.mob-cat.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.mob-cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

@media(max-width:600px){
  .sidebar{display:none}
  .mob-cats{display:flex}
  .main{flex-direction:column;height:auto;overflow:visible}
  .map-area{padding:12px;overflow:visible}
  .area-row.bottom{grid-template-columns:1fr 1fr}
  .area-name{font-size:11px}
  .hall{font-size:9px;padding:2px 5px}
}
</style>

var currentPhase = 1;
var selectedCat = null;
var selectedArea = null;

function setPhase(n, btn) {
  currentPhase = n;
  selectedCat = null;
  selectedArea = null;
  document.querySelectorAll('.phase-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  renderAll();
}

function renderAll() {
  var d = DATA[currentPhase];
  var areas = ['A','B','C','D','A2','B2'];

  areas.forEach(function(area) {
    var a = d[area];
    if (!a) return;
    var box = document.getElementById('box-' + area);
    var nameEl = document.getElementById('aname-' + area);
    var hallsEl = document.getElementById('halls-' + area);
    if (!box || !nameEl || !hallsEl) return;

    nameEl.textContent = a.name;
    box.style.borderColor = a.color + '44';
    box.style.color = a.color;

    // collect all halls from cats
    var hallMap = {};
    a.cats.forEach(function(cat) {
      cat.halls.forEach(function(h) {
        if (!hallMap[h]) hallMap[h] = cat;
      });
    });

    hallsEl.innerHTML = '';
    Object.keys(hallMap).sort().forEach(function(h) {
      var cat = hallMap[h];
      var el = document.createElement('div');
      el.className = 'hall';
      el.textContent = h;
      el.style.background = cat.bg;
      el.style.color = cat.text;
      el.onclick = function(e) { e.stopPropagation(); selectHall(area, h, cat); };
      hallsEl.appendChild(el);
    });

    box.classList.remove('highlighted','dimmed');
  });

  renderSidebar();
  renderMobCats();
  document.getElementById('detail').innerHTML = '<div class="detail-none">Toque em uma area ou hall para ver detalhes</div>';
}

function selectArea(area) {
  selectedArea = area;
  selectedCat = null;
  var d = DATA[currentPhase][area];
  if (!d) return;

  document.querySelectorAll('.area-box').forEach(function(b) { b.classList.remove('highlighted','dimmed'); });
  document.getElementById('box-' + area).classList.add('highlighted');

  var detail = document.getElementById('detail');
  var cats = d.cats.map(function(c) {
    return '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05)">' +
      '<div style="width:10px;height:10px;border-radius:3px;background:'+c.color+';flex-shrink:0;margin-top:2px"></div>' +
      '<div><div style="font-size:12px;font-weight:500">' + c.name + (c.priority ? ' <span style="font-size:9px;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:3px;font-weight:600">FOCO</span>' : '') + '</div>' +
      '<div style="font-size:10px;color:#888;margin-top:1px">Halls: ' + c.halls.join(', ') + '</div></div></div>';
  }).join('');

  detail.innerHTML = '<div class="detail-header"><div class="detail-dot" style="background:'+d.color+'"></div><div><div class="detail-title">Area ' + area.replace('2','') + ' — ' + d.name + '</div></div></div>' +
    (cats || '<div style="font-size:12px;color:#aaa">Sem categorias especificas nesta secao</div>');
}

function selectHall(area, hall, cat) {
  selectedCat = cat.name;
  var d = DATA[currentPhase][area];

  document.querySelectorAll('.area-box').forEach(function(b) { b.classList.add('dimmed'); });
  // highlight all areas that have this cat
  var areas = ['A','A2','B','B2','C','D'];
  areas.forEach(function(a) {
    var ad = DATA[currentPhase][a];
    if (!ad) return;
    var found = ad.cats.some(function(c){ return c.name === cat.name; });
    if (found) {
      document.getElementById('box-' + a).classList.remove('dimmed');
      document.getElementById('box-' + a).classList.add('highlighted');
    }
  });

  // highlight hall pills
  document.querySelectorAll('.hall').forEach(function(el) {
    el.classList.remove('focus');
    if (el.textContent === hall) el.classList.add('focus');
  });

  var detail = document.getElementById('detail');
  detail.innerHTML = '<div class="detail-header"><div class="detail-dot" style="background:'+cat.color+'"></div>' +
    '<div><div class="detail-title">' + cat.name + (cat.priority ? ' <span class="detail-tag" style="background:#FEF3C7;color:#92400E">Seu foco</span>' : '') + '</div>' +
    '<div class="detail-halls">Halls: ' + cat.halls.join(' · ') + '</div></div></div>';
}

function renderSidebar() {
  var d = DATA[currentPhase];
  var sb = document.getElementById('sidebar');
  var areas = [
    {key:'A', label:'Area A'}, {key:'B', label:'Area B'},
    {key:'C', label:'Area C'}, {key:'D', label:'Area D'}
  ];
  sb.innerHTML = '';
  areas.forEach(function(ar) {
    var a = d[ar.key];
    if (!a || !a.cats.length) return;
    var sec = document.createElement('div');
    sec.className = 'sidebar-section';
    sec.textContent = ar.label + ' — ' + a.name;
    sb.appendChild(sec);
    a.cats.forEach(function(cat) {
      var item = document.createElement('div');
      item.className = 'cat-item';
      item.style.color = cat.color;
      item.innerHTML = '<div class="cat-dot" style="background:'+cat.color+'"></div>' +
        '<div><div class="cat-name">' + cat.name + (cat.priority ? ' <span style="font-size:9px;background:'+cat.bg+';color:'+cat.text+';padding:1px 4px;border-radius:3px">foco</span>' : '') + '</div>' +
        '<div class="cat-halls">' + cat.halls.join(', ') + '</div></div>';
      item.onclick = function() { selectHall(ar.key, cat.halls[0], cat); };
      sb.appendChild(item);
    });
  });
}

function renderMobCats() {
  var d = DATA[currentPhase];
  var mc = document.getElementById('mob-cats');
  mc.innerHTML = '';
  var areas = ['A','B','C','D'];
  areas.forEach(function(ar) {
    var a = d[ar];
    if (!a) return;
    a.cats.forEach(function(cat) {
      var el = document.createElement('div');
      el.className = 'mob-cat';
      el.innerHTML = '<div class="mob-cat-dot" style="background:'+cat.color+'"></div>' + cat.name.split('&')[0].trim();
      el.onclick = function() {
        document.querySelectorAll('.mob-cat').forEach(function(m){m.classList.remove('on')});
        el.classList.add('on');
        selectHall(ar, cat.halls[0], cat);
        document.querySelector('.map-area').scrollIntoView({behavior:'smooth'});
      };
      mc.appendChild(el);
    });
  });
}

renderAll();
</script>
</body>
</html>
